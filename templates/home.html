{% extends 'base.html' %}

{% block title %}Teacher Dashboard{% endblock %}

{% block content %}
<section class="surface p-4 p-md-5">
    <p class="text-uppercase fw-bold mb-2" style="color: var(--brand);">Teacher workspace</p>
    <h1 class="fw-bold mb-3">Welcome, {{ request.user.username }}</h1>
    <p class="text-muted mb-4">
        Start a student assessment or review saved cognitive load results from previous sessions.
    </p>

    <div class="d-flex flex-wrap gap-2">
        <a href="{% url 'student_details' %}" class="btn btn-primary btn-lg">Start Cognitive Test</a>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary btn-lg">View Dashboard</a>
    </div>
</section>
{% endblock %}
