{% extends 'base.html' %}

{% block title %}Teacher Registration{% endblock %}

{% block content %}
<section class="surface p-4 p-md-5 mx-auto" style="max-width: 520px;">
    <p class="text-uppercase fw-bold mb-2" style="color: var(--brand);">Professional registration</p>
    <h1 class="h2 fw-bold mb-3">Create Teacher Account</h1>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control form-control-lg" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control form-control-lg" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold" for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100">Register</button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>
</section>
{% endblock %}
